{% extends "base_layout.html" %}
{% load static %}
{% block title %}{{ article.title }}{% endblock title %}
{% block content %}
<div class="article-confirm-delete">
    <h1 class="mb-3">Are you sure?</h1>
    <form class="article-form" method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form }}
      <button type="submit" class="submit-btn">Yes</button>
      <a href="{% url 'homepage' %}" class=btn-secondary">Cancel</a>
    </form>
</div>
{% endblock content %}
