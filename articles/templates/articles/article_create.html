{% extends "base_layout.html" %}
{% load static %}
{% block title %}Create article{% endblock title %}
{% block content %}
<h1 class="page-title">Create article</h1>
<form class="article-form" action="{% url 'articles:create' %}" method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form }}
  <button type="submit" class="submit-btn">Create article</button>
</form>
{% endblock content %}
