{% extends "base_layout.html" %}
{% load static %}
{% block title %}Create article or update article{% endblock title %}
{% block content %}
<h1 class="page-title">Create or update article</h1>
<form class="article-form" method="post" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form }}
  <button type="submit" class="submit-btn">Save</button>
</form>
{% endblock content %}
