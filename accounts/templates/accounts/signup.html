{% extends "base_layout.html" %}
{% block title %}{{ article.title }}{% endblock title %}
{% block content %}
    <section class="auth-section">
        <h1>Signup</h1>
        <form class="form-card" action="/accounts/signup/" method="post">
            {% csrf_token %}
            {{ form }}
            <button type="submit" class="btn-primary"   >Sign up</button>
        </form>
    </section>
{% endblock content %}
